<div class="car-edit">
  <app-breadcrumb [items]="breadcrumbs" />
  <h1>Editar coche</h1>

  <form [formGroup]="carForm" (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h2>Datos del coche</h2>
      <div class="form-group">
        <label for="brand">Marca</label>
        <input id="brand" type="text" formControlName="brand" />
      </div>

      <div class="form-group">
        <label for="model">Modelo</label>
        <input id="model" type="text" formControlName="model" />
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <h2>Unidades</h2>
        <button
          type="button"
          appButton
          variant="secondary"
          (click)="addCarDetail()"
        >
          + Añadir unidad
        </button>
      </div>

      @for (detail of carDetails.controls; track $index) {
        <div class="unit-form" [formGroup]="$any(detail)">
          <div class="form-group">
            <label [for]="'licensePlate-' + $index">Matrícula</label>
            <input
              [id]="'licensePlate-' + $index"
              type="text"
              formControlName="licensePlate"
            />
          </div>

          <div class="form-group">
            <label [for]="'mileage-' + $index">Kilometraje</label>
            <input
              [id]="'mileage-' + $index"
              type="number"
              formControlName="mileage"
            />
          </div>

          <div class="form-group">
            <label [for]="'price-' + $index">Precio</label>
            <input
              [id]="'price-' + $index"
              type="number"
              formControlName="price"
            />
          </div>

          <div class="form-group">
            <label [for]="'currency-' + $index">Moneda</label>
            <select [id]="'currency-' + $index" formControlName="currency">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </div>

          <div class="form-group">
            <label [for]="'manufactureYear-' + $index"
              >Año de fabricación</label
            >
            <input
              [id]="'manufactureYear-' + $index"
              type="number"
              formControlName="manufactureYear"
            />
          </div>

          <div class="form-group">
            <label [for]="'registrationDate-' + $index"
              >Fecha de registro</label
            >
            <input
              [id]="'registrationDate-' + $index"
              type="date"
              formControlName="registrationDate"
            />
          </div>

          <div class="form-group">
            <label [for]="'availability-' + $index">Disponible</label>
            <input
              [id]="'availability-' + $index"
              type="checkbox"
              formControlName="availability"
            />
          </div>

          <button
            type="button"
            appButton
            variant="danger"
            size="sm"
            (click)="removeCarDetail($index)"
          >
            Eliminar unidad
          </button>
        </div>
      }
    </div>

    <div class="form-actions">
      <button
        type="button"
        appButton
        variant="danger"
        (click)="openDeleteModal()"
      >
        Eliminar
      </button>
      <button
        type="button"
        appButton
        variant="ghost"
        (click)="router.navigate(['/'])"
      >
        Cancelar
      </button>
      <button type="submit" appButton [disabled]="carForm.invalid">
        Actualizar
      </button>
    </div>
  </form>
</div>

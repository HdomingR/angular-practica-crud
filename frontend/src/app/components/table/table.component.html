<div class="table-container">
  <div class="table-header">
    <button appButton [routerLink]="['/cars/create']">Nuevo coche</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Marca</th>
        <th>Modelo</th>
        <th>Total</th>
        <th colspan="2">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (car of cars$ | async; track car.id) {
        <tr>
          <td>
            <a [routerLink]="['/cars', car.id]">{{ car.id }}</a>
          </td>
          <td>
            <a [routerLink]="['/cars', car.id]">{{ car.brand }}</a>
          </td>
          <td>{{ car.model }}</td>
          <td>{{ car.total }}</td>
          <td class="actions">
            <button class="menu-trigger" (click)="toggleMenu(car.id)">⋮</button>
            @if (activeMenuId() === car.id) {
              <div class="context-menu">
                <button
                  appButton
                  variant="secondary"
                  size="sm"
                  [routerLink]="['/cars/edit', car.id]"
                >
                  Editar
                </button>
                <button
                  appButton
                  variant="danger"
                  size="sm"
                  (click)="openDeleteModal(car)"
                >
                  Eliminar
                </button>
              </div>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
